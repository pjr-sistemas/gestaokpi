<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Gestão KPI</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#0A0A0A">
  <style>
    :root {
      --bg:#0A0A0A; --card:#141414; --card2:#1C1C1C; --border:#2A2A2A;
      --gold:#C9A84C; --gold-l:#E8C96B; --text:#FFFFFF; --muted:#888888;
      --bronze:#CD7F32; --prata:#A8A9AD; --ouro:#FFD700;
      --fora:#444444; --danger:#E53935; --success:#43A047;
      --sidebar-w:220px;
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { background:var(--bg); color:var(--text); font-family:'Segoe UI',Arial,sans-serif; min-height:100vh; }

    /* ══ TOPBAR ══ */
    .topbar {
      position:fixed; top:0; left:0; right:0; height:52px; z-index:200;
      background:#0d0d0d; border-bottom:1px solid var(--border);
      display:flex; align-items:center; padding:0 16px; gap:12px;
    }
    .topbar .tb-toggle { background:none; border:none; color:var(--muted); font-size:1.3rem; cursor:pointer; padding:4px 8px; border-radius:6px; display:none; }
    .topbar .tb-logo { height:28px; }
    .topbar .tb-title { font-size:1rem; font-weight:700; color:var(--gold); letter-spacing:1px; flex:1; }
    .topbar .tb-user { display:flex; align-items:center; gap:8px; }
    .topbar .tb-user span { font-size:.8rem; color:var(--muted); }
    .topbar .tb-user .btn-sair { background:none; border:1px solid var(--border); color:var(--muted); border-radius:6px; padding:5px 10px; cursor:pointer; font-size:.75rem; }
    .topbar .tb-user .btn-sair:hover { border-color:var(--danger); color:var(--danger); }
    .topbar .btn-lock { background:none; border:1px solid var(--border); color:var(--muted); border-radius:6px; padding:5px 8px; cursor:pointer; font-size:.9rem; }
    .topbar .btn-lock.unlocked { border-color:var(--success); color:var(--success); }

    /* ══ LAYOUT ══ */
    .system-wrap { display:flex; padding-top:52px; min-height:100vh; }

    /* ══ SIDEBAR ══ */
    .sidebar {
      width:var(--sidebar-w); background:#0d0d0d; border-right:1px solid var(--border);
      position:fixed; top:52px; bottom:0; left:0; overflow-y:auto; z-index:100;
      transition:transform .25s;
    }
    .sidebar-section { padding:12px 8px 4px; }
    .sidebar-section .ss-label { font-size:.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; padding:0 8px; margin-bottom:6px; }
    .sidebar-item {
      display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px;
      cursor:pointer; transition:all .15s; color:var(--muted); font-size:.85rem; font-weight:500;
      margin-bottom:2px;
    }
    .sidebar-item:hover { background:var(--card); color:var(--text); }
    .sidebar-item.active { background:#1e1600; color:var(--gold); border-left:3px solid var(--gold); padding-left:9px; }
    .sidebar-item .si-icon { font-size:1rem; width:20px; text-align:center; flex-shrink:0; }
    .sidebar-item .si-nome { flex:1; }
    .sidebar-item .si-badge { font-size:.6rem; background:#1e1600; color:var(--gold); border:1px solid var(--gold); border-radius:10px; padding:1px 6px; }
    .sidebar-item .si-badge.breve { background:var(--card2); color:var(--muted); border-color:var(--border); }
    .sidebar-divider { height:1px; background:var(--border); margin:8px 12px; }

    /* ══ MAIN CONTENT ══ */
    .main-content { margin-left:var(--sidebar-w); flex:1; min-height:calc(100vh - 52px); }

    /* ══ TELA BOAS-VINDAS ══ */
    .welcome-screen {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height:calc(100vh - 52px); padding:40px 24px; text-align:center;
    }
    .welcome-screen .ws-icon { font-size:4rem; margin-bottom:20px; }
    .welcome-screen h2 { font-size:1.4rem; color:var(--gold); margin-bottom:8px; }
    .welcome-screen p { color:var(--muted); font-size:.9rem; max-width:340px; }

    /* ══ PORTAL DO SETOR ══ */
    .setor-portal { padding:24px; max-width:800px; }
    .portal-header { margin-bottom:24px; }
    .portal-header h2 { font-size:1.3rem; color:var(--gold); display:flex; align-items:center; gap:10px; }
    .portal-header p { font-size:.82rem; color:var(--muted); margin-top:4px; }
    .portal-cards { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .portal-card { background:var(--card); border:2px solid var(--border); border-radius:14px; padding:24px; transition:all .2s; }
    .portal-card:hover { border-color:var(--gold); }
    .portal-card .pc-icon { font-size:2rem; margin-bottom:12px; }
    .portal-card .pc-titulo { font-size:1rem; font-weight:700; color:var(--text); margin-bottom:4px; }
    .portal-card .pc-nome { font-size:.82rem; color:var(--gold); margin-bottom:16px; }
    .portal-card input[type=password] { width:100%; padding:10px 12px; border-radius:8px; border:1.5px solid var(--border); background:var(--card2); color:var(--text); font-size:.92rem; outline:none; margin-bottom:10px; }
    .portal-card input[type=password]:focus { border-color:var(--gold); }
    .portal-card .btn-gold { width:100%; padding:11px; border-radius:8px; border:none; background:var(--gold); color:#0A0A0A; font-size:.92rem; font-weight:700; cursor:pointer; }
    .portal-card .btn-gold:hover { background:var(--gold-l); }
    .portal-card .pc-err { font-size:.75rem; color:var(--danger); margin-top:6px; min-height:16px; }
    .portal-card.em-breve { opacity:.5; pointer-events:none; }
    .em-breve-label { display:inline-flex; align-items:center; gap:6px; background:#1e1600; border:1px solid var(--gold); color:var(--gold); border-radius:20px; padding:4px 12px; font-size:.75rem; margin-top:8px; }

    /* ══ TELA LOGADA DO SETOR ══ */
    .setor-logado { display:flex; flex-direction:column; min-height:calc(100vh - 52px); }
    .setor-header { padding:16px 20px 0; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
    .setor-header .sh-info h3 { font-size:1rem; color:var(--gold); }
    .setor-header .sh-info span { font-size:.75rem; color:var(--muted); }
    .setor-header .sh-controls { display:flex; align-items:center; gap:8px; }
    .mes-sel select, .mes-sel input[type=number] { background:var(--card); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:5px 7px; font-size:.78rem; }
    .mes-sel { display:flex; gap:5px; align-items:center; }
    .btn-sair-setor { background:none; border:1px solid var(--border); color:var(--muted); border-radius:6px; padding:6px 10px; cursor:pointer; font-size:.75rem; }
    .btn-sair-setor:hover { border-color:var(--danger); color:var(--danger); }

    /* ══ TABS ══ */
    .tabs { display:flex; background:var(--card); border-bottom:1px solid var(--border); overflow-x:auto; margin-top:14px; }
    .tab-btn { flex:1; min-width:80px; padding:11px 6px; border:none; background:none; color:var(--muted); font-size:.78rem; cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; white-space:nowrap; }
    .tab-btn.active { color:var(--gold); border-bottom-color:var(--gold); }
    .tab-pane { display:none; padding:16px 20px; }
    .tab-pane.active { display:block; }

    /* ══ CARDS INDICADORES ══ */
    .indicadores-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:12px; }
    .ind-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; position:relative; overflow:hidden; }
    .ind-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
    .ind-card.Ouro::before   { background:var(--ouro); }
    .ind-card.Prata::before  { background:var(--prata); }
    .ind-card.Bronze::before { background:var(--bronze); }
    .ind-card.Fora::before   { background:var(--fora); }
    .ind-card.sem-dado::before { background:var(--border); }
    .ind-card .ic-nome  { font-size:.72rem; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:.5px; }
    .ind-card .ic-valor { font-size:1.45rem; font-weight:700; }
    .ind-card .ic-row   { display:flex; align-items:center; justify-content:space-between; margin-top:7px; }
    .badge { display:inline-flex; align-items:center; padding:2px 9px; border-radius:20px; font-size:.72rem; font-weight:700; }
    .badge.Ouro   { background:#332800; color:var(--ouro); }
    .badge.Prata  { background:#222;    color:var(--prata); }
    .badge.Bronze { background:#2a1800; color:var(--bronze); }
    .badge.Fora, .badge.sem-dado { background:#1a1a1a; color:var(--muted); }
    .ic-bonif { font-size:.82rem; color:var(--gold); font-weight:600; }
    .ic-meta  { font-size:.68rem; color:var(--muted); margin-top:4px; }
    .total-bonif { margin-top:14px; background:#1a1200; border:1px solid var(--gold); border-radius:12px; padding:12px 18px; display:flex; align-items:center; justify-content:space-between; }
    .total-bonif .label { color:var(--muted); font-size:.82rem; }
    .total-bonif .valor { font-size:1.4rem; font-weight:700; color:var(--gold); }
    .btn-lancar { display:inline-flex; align-items:center; gap:7px; padding:10px 16px; background:var(--gold); color:#0A0A0A; border:none; border-radius:9px; font-size:.88rem; font-weight:700; cursor:pointer; margin-bottom:14px; }
    .btn-lancar:hover { background:var(--gold-l); }
    .lanc-hoje { margin-bottom:12px; font-size:.78rem; color:var(--muted); }
    .lanc-hoje span { color:var(--gold); font-weight:600; }

    /* ══ DASHBOARD ══ */
    .dash-kpis { display:grid; grid-template-columns:repeat(auto-fill,minmax(145px,1fr)); gap:10px; margin-bottom:18px; }
    .dash-kpi { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px; text-align:center; }
    .dk-label { font-size:.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px; }
    .dk-val   { font-size:1.35rem; font-weight:700; color:var(--gold); }
    .dk-sub   { font-size:.65rem; color:var(--muted); margin-top:2px; }
    .dash-section { margin-bottom:20px; }
    .dash-section h4 { font-size:.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; border-bottom:1px solid var(--border); padding-bottom:5px; }
    .nivel-bar-row { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
    .nb-label { width:170px; font-size:.75rem; color:var(--muted); flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .nb-track { flex:1; height:20px; background:var(--card2); border-radius:4px; overflow:hidden; }
    .nb-fill  { height:100%; border-radius:4px; display:flex; align-items:center; padding-left:7px; font-size:.7rem; font-weight:700; min-width:36px; }
    .nb-fill.Ouro   { background:#332800; color:var(--ouro); border:1px solid var(--ouro); }
    .nb-fill.Prata  { background:#222;    color:var(--prata); border:1px solid var(--prata); }
    .nb-fill.Bronze { background:#2a1800; color:var(--bronze); border:1px solid var(--bronze); }
    .nb-fill.Fora, .nb-fill.sem-dado { background:#1a1a1a; color:var(--muted); border:1px solid var(--border); }
    .placar-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
    .placar-card { background:var(--card); border-radius:10px; padding:10px; text-align:center; border:1px solid var(--border); }
    .placar-card .pc-num { font-size:1.5rem; font-weight:700; }
    .placar-card .pc-lbl { font-size:.65rem; color:var(--muted); }
    .placar-card.ouro .pc-num   { color:var(--ouro); }
    .placar-card.prata .pc-num  { color:var(--prata); }
    .placar-card.bronze .pc-num { color:var(--bronze); }
    .placar-card.fora .pc-num   { color:var(--fora); }
    .chart-wrap { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; overflow-x:auto; }

    /* ══ RANKING AUXILIAR ══ */
    .rank-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:10px; }
    .rank-card .rk-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .rank-card .rk-nome   { font-size:.9rem; font-weight:700; color:var(--gold); }
    .rank-card .rk-bonif  { font-size:.85rem; color:var(--gold); font-weight:600; }
    .rank-card .rk-inds   { display:grid; grid-template-columns:repeat(2,1fr); gap:7px; }
    .rk-ind { background:var(--card2); border-radius:8px; padding:7px 10px; }
    .rk-ind .ri-lbl { font-size:.65rem; color:var(--muted); margin-bottom:2px; text-transform:uppercase; }
    .rk-ind .ri-val { font-size:.88rem; font-weight:700; }

    /* ══ HISTÓRICO ══ */
    .hist-table-wrap { overflow-x:auto; }
    .hist-table { width:100%; border-collapse:collapse; font-size:.75rem; min-width:400px; }
    .hist-table th { background:var(--card2); color:var(--muted); padding:7px 9px; text-align:left; border-bottom:1px solid var(--border); }
    .hist-table td { padding:7px 9px; border-bottom:1px solid var(--border); }
    .hist-table tr:hover td { background:var(--card2); }
    .hist-table .nv.Ouro   { color:var(--ouro); font-weight:700; }
    .hist-table .nv.Prata  { color:var(--prata); font-weight:700; }
    .hist-table .nv.Bronze { color:var(--bronze); font-weight:700; }
    .hist-table .nv.Fora   { color:var(--fora); }
    .hist-toggle { display:flex; gap:8px; margin-bottom:12px; }
    .htog-btn { flex:1; padding:8px; border-radius:8px; border:1.5px solid var(--border); background:var(--card); color:var(--muted); font-size:.78rem; font-weight:600; cursor:pointer; transition:all .2s; }
    .htog-btn.active { border-color:var(--gold); color:var(--gold); background:#1e1600; }
    .hist-diario-sel { display:flex; gap:8px; align-items:center; margin-bottom:10px; }
    .hist-diario-sel select, .hist-diario-sel input { padding:7px 9px; border-radius:7px; border:1.5px solid var(--border); background:var(--card2); color:var(--text); font-size:.82rem; outline:none; }

    /* ══ CONFIG ══ */
    .config-section { margin-bottom:20px; }
    .config-section h4 { color:var(--gold); font-size:.85rem; margin-bottom:10px; }
    .cfg-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
    .cfg-grid label { font-size:.7rem; color:var(--muted); display:block; margin-bottom:2px; }
    .cfg-grid input { width:100%; padding:8px 10px; border-radius:6px; border:1px solid var(--border); background:var(--card2); color:var(--text); font-size:.82rem; outline:none; }
    .metas-ind { margin-bottom:10px; }
    .metas-ind .mi-label { font-size:.72rem; color:var(--muted); margin-bottom:4px; }
    .metas-ind .mi-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
    .metas-ind .mi-grid label { font-size:.68rem; color:var(--muted); display:block; margin-bottom:2px; }
    .metas-ind .mi-grid input { width:100%; padding:7px 8px; border-radius:6px; border:1px solid var(--border); background:var(--card2); color:var(--text); font-size:.78rem; outline:none; }
    .colabs-list { display:flex; flex-direction:column; gap:6px; margin-bottom:10px; }
    .colab-row { display:flex; gap:8px; align-items:center; }
    .colab-row input { flex:1; padding:7px 10px; border-radius:6px; border:1px solid var(--border); background:var(--card2); color:var(--text); font-size:.82rem; outline:none; }
    .btn-rm { background:none; border:1px solid var(--danger); color:var(--danger); border-radius:6px; padding:5px 9px; cursor:pointer; font-size:.78rem; }
    .btn-add-colab { padding:7px 13px; border-radius:6px; border:1px solid var(--gold); background:none; color:var(--gold); cursor:pointer; font-size:.78rem; }
    .api-box { background:var(--card2); border:1px solid var(--border); border-radius:8px; padding:9px 12px; font-size:.68rem; color:var(--muted); word-break:break-all; margin-bottom:5px; }
    .btn-copy { padding:6px 12px; border-radius:6px; border:1px solid var(--gold); background:none; color:var(--gold); cursor:pointer; font-size:.75rem; }

    /* ══ VISÃO GERAL (ÍTALO) ══ */
    .geral-wrap { padding:20px; }
    .geral-kpis { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; margin-bottom:20px; }
    .setores-overview { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; }
    .sov-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; transition:all .2s; }
    .sov-card:hover:not(.em-breve) { border-color:var(--gold); cursor:pointer; }
    .sov-card.em-breve { opacity:.45; }
    .sov-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .sov-nome { font-size:.9rem; font-weight:700; color:var(--gold); display:flex; align-items:center; gap:7px; }
    .sov-bonif { font-size:.82rem; color:var(--gold); font-weight:600; }
    .sov-gestor { font-size:.72rem; color:var(--muted); margin-bottom:8px; }
    .sov-bars { display:flex; flex-direction:column; gap:4px; }
    .sov-bar { display:flex; align-items:center; gap:7px; }
    .sov-bar .sb-lbl { font-size:.65rem; color:var(--muted); width:120px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .sov-bar .sb-trk { flex:1; height:12px; background:var(--card2); border-radius:3px; overflow:hidden; }
    .sov-bar .sb-fil { height:100%; border-radius:3px; }
    .sov-bar .sb-fil.Ouro   { background:var(--ouro); }
    .sov-bar .sb-fil.Prata  { background:var(--prata); }
    .sov-bar .sb-fil.Bronze { background:var(--bronze); }
    .sov-bar .sb-fil.Fora, .sov-bar .sb-fil.sem-dado { background:var(--fora); }
    .geral-config-section { margin-bottom:20px; }
    .geral-config-section h4 { color:var(--gold); font-size:.85rem; margin-bottom:10px; }

    /* ══ MODAL ══ */
    .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:999; align-items:center; justify-content:center; padding:16px; }
    .modal-bg.open { display:flex; }
    .modal { background:var(--card); border:1px solid var(--border); border-radius:16px; width:100%; max-width:480px; max-height:90vh; overflow-y:auto; padding:22px; }
    .modal h3 { color:var(--gold); margin-bottom:14px; font-size:1rem; }
    .form-group { margin-bottom:11px; }
    .form-group label { display:block; font-size:.75rem; color:var(--muted); margin-bottom:3px; }
    .form-group input { width:100%; padding:9px 11px; border-radius:8px; border:1.5px solid var(--border); background:var(--card2); color:var(--text); font-size:.9rem; outline:none; }
    .form-group input:focus { border-color:var(--gold); }
    .form-group .hint { font-size:.68rem; color:var(--muted); margin-top:2px; }
    .modal-actions { display:flex; gap:10px; margin-top:16px; }
    .btn-cancel { flex:1; padding:10px; border-radius:8px; border:1px solid var(--border); background:none; color:var(--muted); cursor:pointer; font-size:.85rem; }

    /* ══ LOADING ══ */
    .loading { text-align:center; padding:40px; color:var(--muted); }
    .spinner { width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 10px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ══ MISC ══ */
    #toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--card2); border:1px solid var(--gold); color:var(--text); padding:9px 18px; border-radius:8px; font-size:.82rem; opacity:0; transition:opacity .3s; z-index:9999; pointer-events:none; white-space:nowrap; }
    #toast.show { opacity:1; }
    .section-lbl { font-size:.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; padding-bottom:5px; border-bottom:1px solid var(--border); }
    .falcioni-ft { text-align:center; margin-top:24px; opacity:.25; }
    .falcioni-ft img { height:20px; }
    .btn-gold-sm { padding:9px 16px; border-radius:8px; border:none; background:var(--gold); color:#0A0A0A; font-size:.82rem; font-weight:700; cursor:pointer; }
    .btn-gold-sm:hover { background:var(--gold-l); }

    /* ══ RESPONSIVO ══ */
    @media (max-width: 680px) {
      :root { --sidebar-w: 200px; }
      .topbar .tb-toggle { display:block; }
      .sidebar { transform:translateX(-100%); }
      .sidebar.open { transform:translateX(0); }
      .main-content { margin-left:0; }
      .portal-cards { grid-template-columns:1fr; }
      .cfg-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<!-- ══ TOPBAR ══ -->
<div class="topbar">
  <button class="tb-toggle" onclick="toggleSidebar()">☰</button>
  <img class="tb-logo" src="logo-jr.png" alt="JR" onerror="this.style.display='none'">
  <span class="tb-title">Gestão KPI</span>
  <div class="tb-user">

function metasColab(s, nome){
  if(s.gruposAux){ const g=(s.colabGrupos&&s.colabGrupos[nome])||Object.keys(s.gruposAux)[0]; return JSON.parse(JSON.stringify(s.gruposAux[g].mA||{})); }
  return MA;
}

// ══ UTILS ══
const fmtBonif = v => adminUnlocked ? `R$ ${v.toFixed(2).replace('.',',')}` : '🔒 ••••';
const fmtVal = (v, unit) => { if(v===null||v===undefined) return '—'; const n=Number(v); return isNaN(n)?'—':n.toLocaleString('pt-BR',{maximumFractionDigits:1})+(unit?` ${unit}`:''); };
const toast = msg => { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); };
const avaliar = (k,v,m) => { if(!m[k]||v===null||v===undefined||v==='') return 'sem-dado'; const n=parseFloat(v); if(m[k].tipo==='maior'){if(n>=m[k].ouro)return 'Ouro';if(n>=m[k].prata)return 'Prata';if(n>=m[k].bronze)return 'Bronze';return 'Fora';}else{if(n<=m[k].ouro)return 'Ouro';if(n<=m[k].prata)return 'Prata';if(n<=m[k].bronze)return 'Bronze';return 'Fora';} };
const calcBonif = (nivel,bonif) => nivel==='Ouro'?bonif.ouro:nivel==='Prata'?bonif.prata:nivel==='Bronze'?bonif.bronze:0;
const agregarMes = (lancs,m) => { const r={}; Object.keys(m).forEach(k=>{ const vals=lancs.map(l=>l[k]).filter(v=>v!=null&&v!==''); if(!vals.length){r[k]=null;return;} const nums=vals.map(Number); r[k]=m[k].agg==='avg'?nums.reduce((a,b)=>a+b,0)/nums.length:nums.reduce((a,b)=>a+b,0); }); return r; };
const calcTotal = (t,m) => Object.keys(m).reduce((s,k)=>s+calcBonif(avaliar(k,t[k],m),m[k].bonif),0);
window.fecharModais = () => document.querySelectorAll('.modal-bg').forEach(m=>m.classList.remove('open'));
window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');

// ══ INICIALIZAÇÃO ══
(async function init() {
  await carregarNomesGestores();
  await carregarDefinicoes();
  renderSidebar();
  renderBoasVindas();
})();

async function carregarNomesGestores() {
  try {
    const snap = await getDoc(doc(db,'config','nomes_gestores'));
    if(snap.exists()) Object.entries(snap.data()).forEach(([k,v])=>{ if(SD[k]) SD[k].gestor=v; });
  } catch(e){}
}

// Aplica sobre o SD as definições de indicadores editadas pelo gestor geral (salvas no banco)
async function carregarDefinicoes() {
  await Promise.all(Object.keys(SD).map(async key=>{
    try {
      const snap = await getDoc(doc(db,'config',`def_${key}`));
      if(snap.exists()){
        const d=snap.data();
        if(d.mG) SD[key].mG=d.mG;
        if(d.mA) SD[key].mA=d.mA;
        if(d.gruposAux) SD[key].gruposAux=d.gruposAux;
      }
    } catch(e){}
  }));
}

function renderSidebar() {
  const container = document.getElementById('nav-setores');
  container.innerHTML = Object.entries(SD).map(([key,s])=>`
    <div class="sidebar-item" id="nav-${key}" onclick="navSetor('${key}')">
      <span class="si-icon">${s.icon}</span>
      <span class="si-nome">${s.nome}</span>
      ${s.status==='em_breve'?'<span class="si-badge breve">breve</span>':''}
    </div>`).join('');
}

function setNavAtivo(id) {
  document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById(`nav-${id}`); if(el) el.classList.add('active');
  navAtivo=id;
  document.getElementById('sidebar').classList.remove('open');
}

async function carregarMetas(key) {

  try {

  } catch(e){}
}

async function carregarSetor() {
  const mes=parseInt(document.getElementById('s-mes').value);
  const ano=parseInt(document.getElementById('s-ano').value);
  const s=SD[setorLogado];
  const col=roleLogado==='gestor'?s.colG:s.colA;
  const metas=roleLogado==='gestor'?MG:MA;
  let q=query(collection(db,col),where('mes','==',mes),where('ano','==',ano));
  if(roleLogado==='auxiliar'&&colaborador) q=query(collection(db,col),where('mes','==',mes),where('ano','==',ano),where('colaborador','==',colaborador));
  const el=id=>document.getElementById(id);
  if(el('cards-loading')) el('cards-loading').style.display='block';
  if(el('cards-grid')) el('cards-grid').style.display='none';
  if(el('cards-total')) el('cards-total').style.display='none';
  const snap=await getDocs(q);
  const dados=snap.docs.map(d=>d.data());
  const totais=agregarMes(dados,metas);
  if(el('cards-loading')) el('cards-loading').style.display='none';
  if(el('cards-grid')){ el('cards-grid').style.display='grid'; el('cards-grid').innerHTML=renderCards(totais,metas); }
  if(el('cards-total')){ el('cards-total').style.display='flex'; el('cards-total-val').textContent=fmtBonif(calcTotal(totais,metas)); }
  const hoje=new Date().toISOString().slice(0,10);
  if(el('lanc-hoje')) el('lanc-hoje').innerHTML=`Lançamentos hoje: <span>${dados.filter(d=>d.data===hoje).length}</span>`;
  if(roleLogado==='gestor'){
    await Promise.all([carregarAuxRanking(mes,ano), renderDash(mes,ano), carregarHistMensal(ano)]);
  } else { await carregarHistMensal(ano); }
}

function renderCards(totais, metas) {
  return Object.keys(metas).map(k=>{
    const m=metas[k]; const v=totais[k]; const nv=avaliar(k,v,metas); const bonif=calcBonif(nv,m.bonif);
    const meta=m.tipo==='maior'?`≥${m.bronze} Bronze · ≥${m.prata} Prata · ${m.ouro} Ouro`:`≤${m.bronze} Bronze · ≤${m.prata} Prata · ${m.ouro} Ouro`;
    return `<div class="ind-card ${nv}">
      <div class="ic-nome">${m.label}</div>
      <div class="ic-valor">${fmtVal(v,m.unit)}</div>
      <div class="ic-row">
        <span class="badge ${nv}">${nv==='sem-dado'?'—':nv==='Fora'?'⚠️ Fora':nv}</span>
        <span class="ic-bonif">${nv!=='sem-dado'&&nv!=='Fora'?fmtBonif(bonif):''}</span>
      </div>
      <div class="ic-meta">Meta: ${meta} ${m.unit}</div>
    </div>`;
  }).join('');
}

// Soma a bonificação de auxiliares a partir de um conjunto de docs (ciente de grupos)
function totalAuxDocs(s, docs) {
  if(!s.gruposAux) return calcTotal(agregarMes(docs,MA),MA);
  const byColab={}; docs.forEach(d=>{ const n=d.colaborador||'—'; (byColab[n]=byColab[n]||[]).push(d); });
  let tot=0; Object.keys(byColab).forEach(n=>{ const m=metasColab(s,n); tot+=calcTotal(agregarMes(byColab[n],m),m); });
  return tot;
}
// ── Dashboard ──
async function renderDash(mes, ano) {
  const s=SD[setorLogado]; const el=id=>document.getElementById(id);
  if(!el('dk-g')) return;
  const snapG=await getDocs(query(collection(db,s.colG),where('mes','==',mes),where('ano','==',ano)));
  const tG=agregarMes(snapG.docs.map(d=>d.data()),MG); const bG=calcTotal(tG,MG);
  const snapA=await getDocs(query(collection(db,s.colA),where('mes','==',mes),where('ano','==',ano)));
  const bA=totalAuxDocs(s,snapA.docs.map(d=>d.data()));
  const ouroG=Object.keys(MG).filter(k=>avaliar(k,tG[k],MG)==='Ouro').length;
  el('dk-g').textContent=fmtBonif(bG); el('dk-a').textContent=fmtBonif(bA);
  el('dk-tot').textContent=fmtBonif(bG+bA); el('dk-ouro').textContent=`${ouroG}/${Object.keys(MG).length}`;
  el('dash-bars').innerHTML=Object.keys(MG).map(k=>{ const nv=avaliar(k,tG[k],MG); const pct=nv==='Ouro'?100:nv==='Prata'?70:nv==='Bronze'?45:20;
    return `<div class="nivel-bar-row"><span class="nb-label">${MG[k].label}</span><div class="nb-track"><div class="nb-fill ${nv}" style="width:${pct}%">${nv}</div></div></div>`; }).join('');
  const nvs=Object.keys(MG).map(k=>avaliar(k,tG[k],MG)); const cnt=n=>nvs.filter(x=>x===n).length;
  el('dash-placar').innerHTML=`<div class="placar-card ouro"><div class="pc-num">${cnt('Ouro')}</div><div class="pc-lbl">Ouro</div></div><div class="placar-card prata"><div class="pc-num">${cnt('Prata')}</div><div class="pc-lbl">Prata</div></div><div class="placar-card bronze"><div class="pc-num">${cnt('Bronze')}</div><div class="pc-lbl">Bronze</div></div><div class="placar-card fora"><div class="pc-num">${cnt('Fora')}</div><div class="pc-lbl">Fora</div></div>`;
  const grafG=[],grafA=[];
  for(let m=1;m<=12;m++){
    const [sg,sa]=await Promise.all([getDocs(query(collection(db,s.colG),where('mes','==',m),where('ano','==',ano))),getDocs(query(collection(db,s.colA),where('mes','==',m),where('ano','==',ano)))]);
    grafG.push(calcTotal(agregarMes(sg.docs.map(d=>d.data()),MG),MG));
    grafA.push(totalAuxDocs(s,sa.docs.map(d=>d.data())));
  }
  renderGrafico(grafG,grafA); el('dash-legend').innerHTML='<span>🟡 Gestor</span><span>🔵 Auxiliar</span>';
}

function renderGrafico(s1,s2) {
  const svg=document.getElementById('dash-chart'); if(!svg) return;
  const W=700,H=180,P=30,B=20,max=Math.max(...s1,...s2,1);
  const x=i=>P+i*(W-P*2)/11; const y=v=>P+(1-v/max)*(H-P-B);
  const pts=s=>s.map((v,i)=>`${x(i)},${y(v)}`).join(' ');
  const lbls=['J','F','M','A','M','J','J','A','S','O','N','D'].map((l,i)=>`<text x="${x(i)}" y="${H-4}" fill="#555" font-size="11" text-anchor="middle">${l}</text>`).join('');
  svg.innerHTML=`<polyline fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linejoin="round" points="${pts(s1)}"/><polyline fill="none" stroke="#6b8cff" stroke-width="2.5" stroke-linejoin="round" points="${pts(s2)}"/>${s1.map((v,i)=>`<circle cx="${x(i)}" cy="${y(v)}" r="4" fill="#C9A84C"/>`).join('')}${s2.map((v,i)=>`<circle cx="${x(i)}" cy="${y(v)}" r="4" fill="#6b8cff"/>`).join('')}${lbls}`;
}

    let q=query(collection(db,s.colA),where('mes','==',mes),where('ano','==',ano));
    if(colab) q=query(collection(db,s.colA),where('mes','==',mes),where('ano','==',ano),where('colaborador','==',colab));
    const sn=await getDocs(q); const dados=sn.docs.map(d=>d.data());
    const mAc=metasColab(s,colab);
    const t=agregarMes(dados,mAc); const bonif=calcTotal(t,mAc); total+=bonif;
    const sem=dados.length===0;
    const grpLbl=s.gruposAux&&s.colabGrupos&&s.gruposAux[s.colabGrupos[colab]]?` <span style="font-size:.68rem;color:var(--gold)">· ${s.gruposAux[s.colabGrupos[colab]].nome}</span>`:'';
    html+=`<div class="rank-card"><div class="rk-header"><span class="rk-nome">👤 ${colab||'Auxiliar'}${grpLbl}</span>${sem?'<span style="font-size:.75rem;color:var(--muted);font-style:italic">Sem lançamento</span>':`<span class="rk-bonif">${fmtBonif(bonif)}</span>`}</div>${sem?'':`<div class="rk-inds">${Object.keys(mAc).map(k=>{ const nv=avaliar(k,t[k],mAc); return `<div class="rk-ind"><div class="ri-lbl">${mAc[k].label}</div><div class="ri-val" style="color:${nvsClr[nv]}">${fmtVal(t[k],mAc[k].unit)}</div></div>`; }).join('')}</div>`}</div>`;
  }
  el('aux-loading').style.display='none'; el('aux-ranking').innerHTML=html;
  el('aux-total').style.display='flex'; el('aux-total-val').textContent=fmtBonif(total);
}

window.atualizarGeral = async () => {

  for(const [key,s] of setoresAtivos){

      return `<div class="sov-bar"><span class="sb-lbl">${s.mG[k].label}</span><div class="sb-trk"><div class="sb-fil ${nv}" style="width:${pct}%"></div></div></div>`; }).join('');
    html+=`<div class="sov-card"><div class="sov-header"><div class="sov-nome">${s.icon} ${s.nome}</div><span class="sov-bonif">${fmtBonif(bG)}</span></div><div class="sov-gestor">Responsável: ${s.gestor}</div><div class="sov-bars">${bars}</div><div style="margin-top:7px;font-size:.68rem;color:var(--muted)">${ouro}/${Object.keys(s.mG).length} indicadores Ouro</div></div>`;
  }
  Object.entries(SD).filter(([,s])=>s.status==='em_breve'&&!supervisorSetores).forEach(([,s])=>{
    html+=`<div class="sov-card em-breve"><div class="sov-header"><div class="sov-nome">${s.icon} ${s.nome}</div><span style="font-size:.65rem;color:var(--gold);background:#1e1600;border:1px solid var(--gold);border-radius:10px;padding:2px 8px">Em breve</span></div><div class="sov-gestor">Responsável: ${s.gestor}</div></div>`;
  });
  const el=id=>document.getElementById(id);
  if(el('geral-setores')) el('geral-setores').innerHTML=html;
  if(el('geral-kpis')) el('geral-kpis').innerHTML=`
    <div class="dash-kpi"><div class="dk-label">Bonif. Total Gestores</div><div class="dk-val">${fmtBonif(totalBonif)}</div><div class="dk-sub">setores ativos</div></div>
    <div class="dash-kpi"><div class="dk-label">Setores</div><div class="dk-val" style="color:var(--success)">${setoresAtivos.length}/${supervisorSetores?supervisorSetores.length:10}</div></div>
    <div class="dash-kpi"><div class="dk-label">Indicadores Ouro</div><div class="dk-val" style="color:var(--ouro)">${totalOuro}/${totalInds}</div></div>`;
};

function renderCfgNomesSetores() {
  const el=document.getElementById('cfg-nomes-setores'); if(!el) return;
  el.innerHTML=Object.entries(SD).map(([key,s])=>`<div><label style="font-size:.7rem;color:var(--muted);display:block;margin-bottom:2px">${s.icon} ${s.nome}</label><input type="text" id="gn-${key}" value="${s.gestor}" style="width:100%;padding:7px 9px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:.82rem;outline:none"></div>`).join('');
}
window.salvarNomesSetores = async () => {
  const obj={}; Object.keys(SD).forEach(k=>{ const el=document.getElementById(`gn-${k}`); if(el){ SD[k].gestor=el.value; obj[k]=el.value; } });
  await setDoc(doc(db,'config','nomes_gestores'),obj); toast('✅ Nomes salvos!');
};
window.salvarSenhasGerais = async () => {
  const g=document.getElementById('cfg-geral-senha').value, a=document.getElementById('cfg-admin-senha').value;
  if(!g&&!a){toast('⚠️ Digite ao menos uma senha');return;}
  const snap=await getDoc(doc(db,'config','senhas_geral')); const atual=snap.exists()?snap.data():{gestor:'admin123',admin:'admin123'};
  if(g)atual.gestor=g; if(a)atual.admin=a;
  await setDoc(doc(db,'config','senhas_geral'),atual);
  document.getElementById('cfg-geral-senha').value=''; document.getElementById('cfg-admin-senha').value='';
  toast('✅ Senhas gerais salvas!');
};
window.salvarSenhaSetorGeral = async (key) => {
  const s=SD[key]; const g=document.getElementById(`ss-g-${key}`).value, a=document.getElementById(`ss-a-${key}`).value;
  if(!g&&!a){toast('⚠️ Digite ao menos uma senha');return;}
  const snap=await getDoc(doc(db,'config',s.cfgSenhas)); const atual=snap.exists()?snap.data():{gestor:'gestor123',auxiliar:'auxiliar123',admin:'admin123'};
  if(g)atual.gestor=g; if(a)atual.auxiliar=a;
  await setDoc(doc(db,'config',s.cfgSenhas),atual);
  document.getElementById(`ss-g-${key}`).value=''; document.getElementById(`ss-a-${key}`).value='';
  toast(`✅ Senhas de ${s.nome} salvas!`);
};
// ══ EDITOR DE INDICADORES (gestor geral) ══
let editKey=null, editData=null; const editColls={};
window.renderEditorInd = () => {
  const key=document.getElementById('edit-setor-sel').value;
  const area=document.getElementById('editor-ind-area');
  if(!key){ area.innerHTML=''; editKey=null; return; }
  editKey=key; const s=SD[key];
  editData=JSON.parse(JSON.stringify(s.gruposAux?{mG:s.mG||{},gruposAux:s.gruposAux}:{mG:s.mG||{},mA:s.mA||{}}));
  Object.keys(editColls).forEach(k=>delete editColls[k]);
  editColls['cG']=editData.mG;
  if(editData.gruposAux) Object.entries(editData.gruposAux).forEach(([gk,g])=>editColls['g_'+gk]=g.mA);
  else editColls['cA']=editData.mA;
  refreshEditorArea();
};
function editorLabel(cid){
  if(cid==='cG') return '👔 Gestor';
  if(cid==='cA') return '🔧 Auxiliar';
  const gk=cid.slice(2); return '🔧 Aux: '+(editData.gruposAux?.[gk]?.nome||gk);
}
function refreshEditorArea(){
  const area=document.getElementById('editor-ind-area'); if(!area) return;
  area.innerHTML = Object.keys(editColls).map(cid=>editorCollHtml(cid)).join('') +
    `<button class="btn-gold-sm" style="margin-top:10px" onclick="salvarDefSetor()">💾 Salvar Indicadores de ${SD[editKey].nome}</button>`;
}
function editorCollHtml(cid){
  const rows=Object.keys(editColls[cid]).map(k=>editorRowHtml(cid,k)).join('') || '<p style="font-size:.72rem;color:var(--muted)">Nenhum indicador.</p>';
  return `<div style="border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <strong style="font-size:.82rem">${editorLabel(cid)}</strong>
      <button class="btn-add-colab" onclick="editorAddInd('${cid}')">+ Indicador</button>
    </div>${rows}</div>`;
}
window.edSet = (cid,k,field,value,isNum) => {
  const m=editColls[cid]&&editColls[cid][k]; if(!m) return;
  const val=isNum?(parseFloat(value)||0):value;
  if(field.indexOf('.')>-1){ const[a,b]=field.split('.'); if(!m[a])m[a]={}; m[a][b]=val; } else m[field]=val;
};
function editorRowHtml(cid,k){
  const m=editColls[cid][k]; if(!m.bonif)m.bonif={bronze:0,prata:0,ouro:0};
  const u=['%','h','oc','pt','un','R$'];
  const num=(v,field,w='58px')=>`<input type="number" step="0.01" value="${v}" onchange="edSet('${cid}','${k}','${field}',this.value,true)" style="width:${w};padding:5px 6px;border-radius:5px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:.75rem;outline:none">`;
  return `<div style="border-top:1px dashed var(--border);padding:8px 0;display:flex;flex-wrap:wrap;gap:5px;align-items:center">
    <input value="${(m.label||'').replace(/"/g,'&quot;')}" oninput="edSet('${cid}','${k}','label',this.value,false)" placeholder="Nome" style="flex:1;min-width:150px;padding:5px 7px;border-radius:5px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:.76rem;outline:none">
    <select onchange="edSet('${cid}','${k}','tipo',this.value,false)" style="padding:5px;border-radius:5px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:.74rem">
      <option value="maior"${m.tipo==='maior'?' selected':''}>maior↑</option>
      <option value="menor"${m.tipo==='menor'?' selected':''}>menor↓</option>
    </select>
    <select onchange="edSet('${cid}','${k}','unit',this.value,false)" style="padding:5px;border-radius:5px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:.74rem">
      ${u.map(x=>`<option value="${x}"${m.unit===x?' selected':''}>${x}</option>`).join('')}
    </select>
    <span style="font-size:.66rem;color:var(--muted)">meta:</span>
    ${num(m.bronze,'bronze')}
    ${num(m.prata,'prata')}
    ${num(m.ouro,'ouro')}
    <span style="font-size:.66rem;color:var(--gold)">R$:</span>
    ${num(m.bonif.bronze,'bonif.bronze')}
    ${num(m.bonif.prata,'bonif.prata')}
    ${num(m.bonif.ouro,'bonif.ouro')}
    <button class="btn-rm" onclick="editorRemInd('${cid}','${k}')">✕</button>
  </div>`;
}
window.editorAddInd=(cid)=>{ editColls[cid]['ind_'+Date.now()]={label:'Novo Indicador',tipo:'maior',unit:'%',bronze:0,prata:0,ouro:0,bonif:{bronze:0,prata:0,ouro:0},agg:'avg'}; refreshEditorArea(); };
window.editorRemInd=(cid,k)=>{ if(confirm('Remover este indicador?')){ delete editColls[cid][k]; refreshEditorArea(); } };
window.salvarDefSetor=async()=>{
  const fixAgg=obj=>Object.values(obj).forEach(m=>{ m.agg=['oc','pt','un'].includes(m.unit)?'sum':'avg'; if(!m.bonif)m.bonif={bronze:0,prata:0,ouro:0}; });
  fixAgg(editData.mG);
  if(editData.gruposAux) Object.values(editData.gruposAux).forEach(g=>fixAgg(g.mA)); else fixAgg(editData.mA);
  const payload={mG:editData.mG}; if(editData.gruposAux)payload.gruposAux=editData.gruposAux; else payload.mA=editData.mA;
  try{
    await setDoc(doc(db,'config',`def_${editKey}`),payload);
    SD[editKey].mG=editData.mG; if(editData.gruposAux)SD[editKey].gruposAux=editData.gruposAux; else SD[editKey].mA=editData.mA;
    toast('✅ Indicadores salvos!'); atualizarGeral();
  }catch(e){ toast('❌ Erro ao salvar'); }
};

const gcColabsMap={};
async function gcCarregarColabs(key) {
  const s=SD[key]; const el=document.getElementById(`gc-colabs-${key}`); if(!el) return;
  try{ const snap=await getDoc(doc(db,'config',s.cfgColabs)); gcColabsMap[key]=snap.exists()?(snap.data().lista||[]):(s.colabsDefault||['Auxiliar 1']); }
  catch(e){ gcColabsMap[key]=['Auxiliar 1']; }
  gcRenderColabs(key);
}
function gcRenderColabs(key) {
  const el=document.getElementById(`gc-colabs-${key}`); if(!el) return;
  el.innerHTML=(gcColabsMap[key]||[]).map((n,i)=>`<div class="colab-row"><input type="text" value="${(n||'').replace(/"/g,'&quot;')}" oninput="gcSetColab('${key}',${i},this.value)"><button class="btn-rm" onclick="gcRemColab('${key}',${i})">✕</button></div>`).join('');
}
window.gcSetColab = (key,i,v) => { if(gcColabsMap[key]) gcColabsMap[key][i]=v; };
window.gcRemColab = (key,i) => { if(gcColabsMap[key]){ gcColabsMap[key].splice(i,1); gcRenderColabs(key); } };
window.gcAddColab = key => { if(!gcColabsMap[key]) gcColabsMap[key]=[]; gcColabsMap[key].push('Novo Auxiliar'); gcRenderColabs(key); };
window.gcSalvarColabs = async key => { const s=SD[key]; await setDoc(doc(db,'config',s.cfgColabs),{lista:gcColabsMap[key]||[]}); toast('✅ Auxiliares salvos!'); };

// ══ ADMIN LOCK ══
window.toggleAdmin = () => {
  if(adminUnlocked){ adminUnlocked=false; atualizarLockUI(); reRender(); }
  else { document.getElementById('admin-senha').value=''; document.getElementById('admin-err').textContent=''; document.getElementById('modal-admin').classList.add('open'); setTimeout(()=>document.getElementById('admin-senha').focus(),100); }
};
window.confirmarAdmin = async () => {
  const senha=document.getElementById('admin-senha').value; const err=document.getElementById('admin-err');
  try {
    const snap=await getDoc(doc(db,'config','senhas_geral'));
    const s=snap.exists()?snap.data():{admin:'admin123'};
    if(senha===(s.admin||'admin123')){ adminUnlocked=true; fecharModais(); atualizarLockUI(); reRender(); }
    else err.textContent='Senha incorreta';
  } catch(e){ err.textContent='Erro de conexão'; }
};
function atualizarLockUI() {
  const btn=document.getElementById('global-lock'); if(!btn) return;
  btn.textContent=adminUnlocked?'🔓':'🔒'; btn.classList.toggle('unlocked',adminUnlocked);
}
function reRender() {
  if(setorLogado&&roleLogado) carregarSetor();
  else if(geralLogado) atualizarGeral();
}

// ── Tabs ──
window.showTab = (id, btn) => {
  document.querySelectorAll('.tab-pane').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById(`tab-${id}`); if(el) el.classList.add('active');
  btn.classList.add('active');
};

if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
